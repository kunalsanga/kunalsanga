name: Generate Snake

on:
  # Runs once a week to reduce failures
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: Platane/snk@v3
        with:
          github_user_name: kunalsanga
          outputs: profile-3d-contrib/github-contribution-grid-snake.svg
          
      - name: Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add profile-3d-contrib/
          git diff --staged --quiet || git commit -m "Update snake animation"
          git push