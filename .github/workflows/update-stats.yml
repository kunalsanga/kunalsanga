name: Refresh GitHub Stats

on:
  schedule:
    # Runs every 3 days to reduce failures
    - cron: '0 0 */3 * *'
  workflow_dispatch: # allows manual triggering

jobs:
  refresh-stats:
    name: Refresh GitHub stats cache
    runs-on: ubuntu-latest
    steps:
      - name: Warm up stats services
        run: |
          echo "Warming up GitHub stats services..."
          
          # Warm up each service with a simple request
          curl -f -s "https://github-readme-stats.vercel.app/api?username=kunalsanga&show_icons=true&theme=radical" > /dev/null || echo "GitHub Stats service unavailable"
          curl -f -s "https://github-readme-activity-graph.vercel.app/graph?username=kunalsanga&theme=react-dark" > /dev/null || echo "Activity Graph service unavailable"
          curl -f -s "https://github-readme-streak-stats.herokuapp.com/?user=kunalsanga&theme=radical" > /dev/null || echo "Streak Stats service unavailable"
          curl -f -s "https://github-profile-summary-cards.vercel.app/api/cards/profile-details?username=kunalsanga&theme=radical" > /dev/null || echo "Profile Summary service unavailable"
          
          echo "Stats refresh completed successfully!" 